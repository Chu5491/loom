<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>loom</title>
    <script>
      // Inline theme bootstrap — runs before React mounts to prevent FOUC.
      (function () {
        try {
          var stored = localStorage.getItem("loom.theme");
          var theme = stored === "light" || stored === "dark" || stored === "system" ? stored : "system";
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var effective = theme === "system" ? (prefersDark ? "dark" : "light") : theme;
          if (effective === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
