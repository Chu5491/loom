<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/loom-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 단일 폰트 정책: CommitMonoChu가 sans/serif/mono를 모두 담당. 외부 CDN
         의존 제거 → 오프라인 동작 + 첫 페인트 빠름. @font-face 정의는
         styles.css 상단에 있음. -->
    <link
      rel="preload"
      href="/fonts/CommitMonoChu-550-Regular.otf"
      as="font"
      type="font/otf"
      crossorigin
    />
    <title>loom</title>
    <script>
      // Inline theme bootstrap — runs before React mounts to prevent FOUC.
      (function () {
        try {
          var stored = localStorage.getItem("loom.theme");
          var theme = stored === "light" || stored === "dark" || stored === "system" ? stored : "system";
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var effective = theme === "system" ? (prefersDark ? "dark" : "light") : theme;
          if (effective === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
